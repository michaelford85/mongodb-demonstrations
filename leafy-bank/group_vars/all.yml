---
# Root directory where all service repos are cloned.
leafy_bank_deploy_dir: "{{ playbook_dir }}/services"

# UI repository (staging branch contains the latest demo features).
leafy_bank_ui_repo: "https://github.com/mongodb-industry-solutions/leafy-bank-ui.git"
leafy_bank_ui_branch: "staging"

# ── Service catalogue ─────────────────────────────────────────────────────────
# Each entry describes one backend microservice.
#   name          – short identifier, used as tag and directory name
#   repo          – GitHub clone URL
#   branch        – branch to check out (default: main)
#   port          – desired host port (what the UI connects to)
#   internal_port – port the container listens on (from upstream docker-compose.yml)
#   core          – true = deployed by default even without explicit selection
#   env_file      – path inside the repo where .env should be written
#   env_vars      – key/value pairs written verbatim into that .env file
#
# The docker_service role patches docker-compose.yml to map port → internal_port
# so all services can run concurrently without host port conflicts.
#
# Secret values (mongodb_uri, api keys, etc.) are sourced from vars/secrets.yml.
# Collection names and other non-secret config live here for easy editing.

leafy_bank_services:

  - name: accounts
    repo: "https://github.com/mongodb-industry-solutions/leafy-bank-backend-accounts.git"
    branch: main
    port: 8080
    internal_port: 8080
    core: true
    env_file: backend/.env
    seed_data_dir: backend/data/sample
    db_setup:
      collections_by_database:
        - database: leafy_bank
          collections:
            - users
            - accounts
            - transactions
            - notifications
    env_vars:
      MONGODB_URI: "{{ mongodb_uri }}"

  - name: transactions
    repo: "https://github.com/mongodb-industry-solutions/leafy-bank-backend-transactions.git"
    branch: main
    port: 8001
    internal_port: 8000
    core: true
    env_file: backend/.env
    seed_data_dir: backend/data/sample
    db_setup:
      collections_by_database:
        - database: leafy_bank
          collections:
            - users
            - accounts
            - transactions
            - notifications
    env_vars:
      MONGODB_URI: "{{ mongodb_uri }}"

  - name: chatbot
    repo: "https://github.com/mongodb-industry-solutions/cross-backend-pdf-rag.git"
    branch: main
    port: 8002
    internal_port: 8080
    core: false
    env_file: backend/.env
    # Path inside the cloned repo where the PDF must be placed before Docker build.
    # The playbook copies chatbot_pdf_path (from secrets.yml) here automatically.
    # Any PDF placed here is ingested; the filename becomes the document title in RAG.
    pdf_dest_dir: backend/data/fsi/leafy_bank_assistant/pdfs
    db_setup:
      collections_by_database:
        - database: leafy_bank_pdf_rag
          collections:
            - default
    # Patch config.yaml after cloning:
    #   - Clear mdb_url_secret so the service uses MONGODB_URI from .env
    #     instead of fetching credentials from AWS Secrets Manager.
    #   - Disable S3 so PDFs are served from the local filesystem.
    file_patches:
      - path: backend/config.yaml
        regexp: 'mdb_url_secret:.*"ist/demos/fsi/mdb/uri"'
        replace: 'mdb_url_secret: ""'
      - path: backend/config.yaml
        regexp: 'aws_s3_enabled: True'
        replace: 'aws_s3_enabled: False'
      # When mdb_url_secret is empty, base.py falls back to MONGODB_URI but
      # never sets self.mdb_database. Patch the else branch to read it from
      # demo_config so downstream code (get_db.py, rag_setup.py) has a name.
      - path: backend/base.py
        regexp: 'self\.mdb_uri = os\.getenv\("MONGODB_URI"\)'
        replace: 'self.mdb_uri = os.getenv("MONGODB_URI")\n            self.mdb_database = self.demo_config.get("mdb_database", "leafy_bank_pdf_rag")'
    env_vars:
      # Include the database name in the URI — superduper parses it from the
      # path component and fails with an empty string if it's omitted.
      MONGODB_URI: "{{ mongodb_uri }}leafy_bank_pdf_rag"
      FSI_INDUSTRY: "fsi"
      FSI_DEMO_NAME: "leafy_bank_assistant"
      AWS_REGION: "{{ aws_region }}"
      NODE_ENV: "prod"

  - name: openfinance
    repo: "https://github.com/mongodb-industry-solutions/leafy-bank-backend-openfinance.git"
    branch: main
    port: 8003
    internal_port: 8080
    core: false
    env_file: backend/.env
    seed_data_dir: backend/data/sample
    db_setup:
      collections_by_database:
        - database: leafy_bank
          collections:
            - users
            - accounts
            - transactions
            - notifications
        - database: open_finance
          collections:
            - external_accounts
            - external_products
            - tokens
    env_vars:
      MONGODB_URI: "{{ mongodb_uri }}"
      OPENFINANCE_DB_NAME: "open_finance"
      LEAFYBANK_DB_NAME: "leafy_bank"

  - name: cm-loaders
    repo: "https://github.com/mongodb-industry-solutions/leafy-bank-backend-capitalmarkets-loaders.git"
    branch: main
    port: 8004
    internal_port: 8080
    core: false
    env_file: backend/.env
    seed_data_dir: backend/loaders/db/collections
    vector_search_indexes:
      - database: agentic_capital_markets
        collection: financial_news
        index_name: financial_news_VS_IDX
        vector_field: article_embedding
        dimensions: 1024
        similarity: cosine
        filter_fields:
          - sentiment_score.positive
          - sentiment_score.negative
          - sentiment_score.neutral
          - ticker
    db_setup:
      collections_by_database:
        - database: agentic_capital_markets
          collections:
            - financial_news
            - pyfredapiMacroeconomicIndicators
            - yfinanceMarketData
            - binanceCryptoData
            - subredditSubmissions
            - stablecoin_market_caps
            - portfolio_allocation
            - portfolio_performance
            - chartMappings
    env_vars:
      MONGODB_URI: "{{ mongodb_uri }}"
      DATABASE_NAME: "agentic_capital_markets"
      APP_NAME: "ist.demo.capital_markets.loaders"
      VOYAGE_API_KEY: "{{ voyage_api_key }}"
      FRED_API_KEY: "{{ fred_api_key }}"
      PORTFOLIO_PERFORMANCE_COLLECTION: "portfolio_performance"
      YFINANCE_TIMESERIES_COLLECTION: "yfinanceMarketData"
      BINANCE_TIMESERIES_COLLECTION: "binanceCryptoData"
      PYFREDAPI_COLLECTION: "pyfredapiMacroeconomicIndicators"
      NEWS_COLLECTION: "financial_news"
      VECTOR_INDEX_NAME: "financial_news_VS_IDX"
      VECTOR_FIELD: "article_embedding"
      SCRAPE_NUM_ARTICLES: "1"
      REDDIT_CLIENT_ID: "{{ reddit_client_id }}"
      REDDIT_SECRET: "{{ reddit_secret }}"
      REDDIT_USERNAME: "{{ reddit_username }}"
      REDDIT_PASSWORD: "{{ reddit_password }}"
      REDDIT_USER_AGENT: "{{ reddit_user_agent }}"

  - name: cm-agents
    repo: "https://github.com/mongodb-industry-solutions/leafy-bank-backend-capitalmarkets-agents.git"
    branch: main
    port: 8005
    internal_port: 8080
    core: false
    env_file: backend/.env
    seed_data_dir: backend/collections
    db_setup:
      collections_by_database:
        - database: agentic_capital_markets
          collections:
            - agent_profiles
            - reports_market_analysis
            - reports_market_news
            - reports_market_sm
            - reports_crypto_analysis
            - reports_crypto_news
            - reports_crypto_sm
            - portfolio_allocation
            - portfolio_performance
            - risk_profiles
            - crypto_portfolio_allocation
    env_vars:
      MONGODB_URI: "{{ mongodb_uri }}"
      DATABASE_NAME: "agentic_capital_markets"
      APP_NAME: "ist.demo.capital_markets.agents"
      VOYAGE_API_KEY: "{{ voyage_api_key }}"
      EMBEDDINGS_MODEL_ID: "voyage-finance-2"
      AWS_REGION: "{{ aws_region }}"
      AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
      AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
      CHAT_COMPLETIONS_MODEL_ID: "{{ bedrock_chat_model_id }}"
      YFINANCE_TIMESERIES_COLLECTION: "yfinanceMarketData"
      PYFREDAPI_COLLECTION: "pyfredapiMacroeconomicIndicators"
      NEWS_COLLECTION: "financial_news"
      PORTFOLIO_PERFORMANCE_COLLECTION: "portfolio_performance"
      PORTFOLIO_COLLECTION: "portfolio_allocation"
      REPORTS_COLLECTION_MARKET_ANALYSIS: "reports_market_analysis"
      REPORTS_COLLECTION_MARKET_NEWS: "reports_market_news"
      REPORTS_COLLECTION_MARKET_SM: "reports_market_sm"
      CRYPTO_TIMESERIES_COLLECTION: "binanceCryptoData"
      CRYPTO_PORTFOLIO_COLLECTION: "crypto_portfolio_allocation"
      COINGECKO_STABLECOIN_COLLECTION: "stablecoin_market_caps"
      REPORTS_COLLECTION_CRYPTO_ANALYSIS: "reports_crypto_analysis"
      REPORTS_COLLECTION_CRYPTO_NEWS: "reports_crypto_news"
      REPORTS_COLLECTION_CRYPTO_SM: "reports_crypto_sm"
      SUBREDDIT_SUBMISSIONS_COLLECTION: "subredditSubmissions"
      # Align news vector index name with what cm-loaders creates
      NEWS_VECTOR_INDEX_NAME: "financial_news_VS_IDX"

  - name: cm-market-assistant
    repo: "https://github.com/mongodb-industry-solutions/leafy-bank-backend-capitalmarkets-react-agent-chatbot.git"
    branch: main
    port: 8006
    internal_port: 8080
    core: false
    env_file: backend/.env
    seed_data_dir: backend/db/collections
    vector_search_indexes:
      - database: agentic_capital_markets
        collection: reports_market_analysis
        index_name: reports_market_analysis_report_embedding_index
        vector_field: report_embedding
        dimensions: 1024
        similarity: cosine
      - database: agentic_capital_markets
        collection: reports_market_news
        index_name: reports_market_news_report_embedding_index
        vector_field: report_embedding
        dimensions: 1024
        similarity: cosine
      - database: agentic_capital_markets
        collection: reports_market_sm
        index_name: reports_market_sm_report_embedding_index
        vector_field: report_embedding
        dimensions: 1024
        similarity: cosine
    db_setup:
      collections_by_database:
        - database: agentic_capital_markets
          collections:
            - agent_profiles
            - checkpoints_aio
            - checkpoint_writes_aio
            - reports_market_analysis
            - reports_market_news
            - reports_market_sm
    env_vars:
      MONGODB_URI: "{{ mongodb_uri }}"
      DATABASE_NAME: "agentic_capital_markets"
      APP_NAME: "ist.demo.capital_markets.react.agent.chatbot"
      VOYAGE_API_KEY: "{{ voyage_api_key }}"
      TAVILY_API_KEY: "{{ tavily_api_key }}"
      AWS_REGION: "{{ aws_region }}"
      AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
      AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
      CHAT_COMPLETIONS_MODEL_ID: "{{ bedrock_chat_model_id }}"
      EMBEDDINGS_MODEL_ID: "voyage-finance-2"
      AGENT_PROFILES_COLLECTION: "agent_profiles"
      CHECKPOINTS_AIO_COLLECTION: "checkpoints_aio"
      CHECKPOINTS_WRITES_AIO_COLLECTION: "checkpoint_writes_aio"
      REPORTS_COLLECTION_MARKET_ANALYSIS: "reports_market_analysis"
      REPORT_MARKET_ANALISYS_VECTOR_INDEX_NAME: "reports_market_analysis_report_embedding_index"
      REPORTS_COLLECTION_MARKET_NEWS: "reports_market_news"
      REPORT_MARKET_NEWS_VECTOR_INDEX_NAME: "reports_market_news_report_embedding_index"
      REPORTS_COLLECTION_MARKET_SM: "reports_market_sm"
      REPORT_MARKET_SM_VECTOR_INDEX_NAME: "reports_market_sm_report_embedding_index"
      REPORT_VECTOR_FIELD: "report_embedding"
      PORTFOLIO_PERFORMANCE_COLLECTION: "portfolio_performance"
      PORTFOLIO_ALLOCATION_COLLECTION: "portfolio_allocation"

  - name: cm-crypto-assistant
    repo: "https://github.com/mongodb-industry-solutions/leafy-bank-backend-capitalmarkets-react-agent-crypto.git"
    branch: main
    port: 8007
    internal_port: 8080
    core: false
    env_file: backend/.env
    seed_data_dir: backend/db/collections
    vector_search_indexes:
      - database: agentic_capital_markets
        collection: reports_crypto_analysis
        index_name: reports_crypto_analysis_report_embedding_index
        vector_field: report_embedding
        dimensions: 1024
        similarity: cosine
      - database: agentic_capital_markets
        collection: reports_crypto_news
        index_name: reports_crypto_news_report_embedding_index
        vector_field: report_embedding
        dimensions: 1024
        similarity: cosine
      - database: agentic_capital_markets
        collection: reports_crypto_sm
        index_name: reports_crypto_sm_report_embedding_index
        vector_field: report_embedding
        dimensions: 1024
        similarity: cosine
    db_setup:
      collections_by_database:
        - database: agentic_capital_markets
          collections:
            - agent_profiles
            - crypto_checkpoints_aio
            - crypto_checkpoint_writes_aio
            - reports_crypto_analysis
            - reports_crypto_news
            - reports_crypto_sm
            - portfolio_performance
            - crypto_portfolio_allocation
    env_vars:
      MONGODB_URI: "{{ mongodb_uri }}"
      DATABASE_NAME: "agentic_capital_markets"
      APP_NAME: "ist.demo.capital_markets.react.agent.crypto"
      VOYAGE_API_KEY: "{{ voyage_api_key }}"
      TAVILY_API_KEY: "{{ tavily_api_key }}"
      AWS_REGION: "{{ aws_region }}"
      AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
      AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
      CHAT_COMPLETIONS_MODEL_ID: "{{ bedrock_chat_model_id }}"
      EMBEDDINGS_MODEL_ID: "voyage-finance-2"
      AGENT_PROFILES_COLLECTION: "agent_profiles"
      CHECKPOINTS_AIO_COLLECTION: "crypto_checkpoints_aio"
      CHECKPOINTS_WRITES_AIO_COLLECTION: "crypto_checkpoint_writes_aio"
      REPORTS_COLLECTION_CRYPTO_ANALYSIS: "reports_crypto_analysis"
      REPORT_CRYPTO_ANALYSIS_VECTOR_INDEX_NAME: "reports_crypto_analysis_report_embedding_index"
      REPORTS_COLLECTION_CRYPTO_NEWS: "reports_crypto_news"
      REPORT_CRYPTO_NEWS_VECTOR_INDEX_NAME: "reports_crypto_news_report_embedding_index"
      REPORTS_COLLECTION_CRYPTO_SM: "reports_crypto_sm"
      REPORT_CRYPTO_SM_VECTOR_INDEX_NAME: "reports_crypto_sm_report_embedding_index"
      REPORT_VECTOR_FIELD: "report_embedding"
      PORTFOLIO_PERFORMANCE_COLLECTION: "portfolio_performance"
      CRYPTO_PORTFOLIO_ALLOCATION_COLLECTION: "crypto_portfolio_allocation"

  - name: cm-mcp
    repo: "https://github.com/mongodb-industry-solutions/leafy-bank-capitalmarkets-mcp.git"
    branch: main
    port: 8008
    internal_port: 8080
    core: false
    # .env lives at the repo root for this Next.js app (not in backend/).
    # AWS credentials are supplied via the ~/.aws volume mount in the
    # upstream docker-compose.yml — no explicit key vars needed here.
    env_file: .env
    env_vars:
      NEXT_PUBLIC_MCP_CONNECTION_STRING: "{{ mongodb_uri }}"
      NEXT_PUBLIC_MCP_API_CLIENT_ID: "{{ atlas_api_client_id }}"
      NEXT_PUBLIC_MCP_API_CLIENT_SECRET: "{{ atlas_api_client_secret }}"
      NEXT_PUBLIC_AWS_REGION: "{{ aws_region }}"
      NEXT_PUBLIC_CHAT_COMPLETIONS_MODEL_ID: "{{ bedrock_chat_model_id }}"
