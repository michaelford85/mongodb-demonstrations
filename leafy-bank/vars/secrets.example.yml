---
# Copy this file to vars/secrets.yml and fill in your values.
# vars/secrets.yml is gitignored — never commit it.

# ── MongoDB Atlas ────────────────────────────────────────────────────────────
# Connection string for your existing Atlas cluster.
# Format: mongodb+srv://<user>:<password>@<cluster>.mongodb.net/
mongodb_uri: "mongodb+srv://USERNAME:PASSWORD@CLUSTER.mongodb.net/"

# Atlas project metadata (informational; used in app names / labels).
atlas_project_id: "YOUR_ATLAS_PROJECT_ID"
atlas_project_name: "YOUR_ATLAS_PROJECT_NAME"

# ── AWS (chatbot + all capital-markets services) ─────────────────────────────
aws_region: "us-east-1"
aws_access_key_id: "YOUR_AWS_ACCESS_KEY_ID"
aws_secret_access_key: "YOUR_AWS_SECRET_ACCESS_KEY"

# AWS Bedrock model used for LLM inference.
bedrock_chat_model_id: "anthropic.claude-3-haiku-20240307-v1:0"

# ── VoyageAI (capital-markets services) ──────────────────────────────────────
voyage_api_key: "YOUR_VOYAGE_API_KEY"

# ── Tavily (market-assistant + crypto-assistant) ──────────────────────────────
tavily_api_key: "YOUR_TAVILY_API_KEY"

# ── FRED API (capital-markets loaders) ───────────────────────────────────────
fred_api_key: "YOUR_FRED_API_KEY"

# ── Reddit / PRAW (capital-markets loaders) ──────────────────────────────────
reddit_client_id: "YOUR_REDDIT_CLIENT_ID"
reddit_secret: "YOUR_REDDIT_SECRET"
reddit_username: "YOUR_REDDIT_USERNAME"
reddit_password: "YOUR_REDDIT_PASSWORD"
reddit_user_agent: "leafy-bank-demo/1.0 by YOUR_REDDIT_USERNAME"

# ── Chatbot / PDF-RAG service ────────────────────────────────────────────────
# AWS Bedrock inference profile ARN for the chatbot completion model.
chatbot_completion_model: "anthropic.claude-3-haiku-20240307-v1:0"
chatbot_embedding_model: "cohere.embed-english-v3"
